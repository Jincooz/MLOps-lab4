include = ["*.py"]

exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "*.ipynb",
]

[tool.ruff.lint]
# Enable: pyflakes (F), pycodestyle (E/W), isort (I), bugbear (B)
select = ["E", "F", "W", "I", "B"]

ignore = [
    "E501",   # line too long
    "B008",   # do not perform function call in default args
    "F401",   # imported but unused
    "F821",   # Undefined name `spark`for notebooks
    "E402",   # Module level import not at top of file
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"