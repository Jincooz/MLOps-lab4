volumes:
  minio-data:
  grafana_data:

services:
  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_PORT}/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
  
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana


  create-bucket:
    image: minio/mc:latest
    container_name: mlflow-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio "http://${MINIO_HOST}:${MINIO_PORT}" \
          "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "myminio/${DATASETS_BUCKET:-datasets}"
        mc mb --ignore-existing "myminio/${INFERENCE_LOGS_BUCKET:-op-store}"
    restart: "no"

  modelapi:
    build: ./api_service
    container_name: modelapi
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    environment:
      STORAGE_URL: http://minio:${MINIO_PORT}
      DATA_BUCKET: ${INFERENCE_LOGS_BUCKET}
      STORAGE_USER: ${MINIO_ROOT_USER}
      STORAGE_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
      DATABRICKS_ENDPOINT: ${DATABRICKS_ENDPOINT}
    ports:
      - "${MODELAPI_PORT}:${MODELAPI_PORT}"

  evidently:
    build: ./api_evidently
    container_name: evidently
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      STORAGE_URL: http://minio:${MINIO_PORT}
      DATA_BUCKET: ${INFERENCE_LOGS_BUCKET}
      REFERENCE_BUCKET: ${DATASETS_BUCKET}
      STORAGE_USER: ${MINIO_ROOT_USER}
      STORAGE_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${EVIDENTLY_PORT}:${EVIDENTLY_PORT}"

networks:
  default:
    name: mlflow-network